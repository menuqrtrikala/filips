# Ρυθμίσεις Netlify για το μενού ΦίΛιΠs
[build]
  publish = "."

# Caching: οι εικόνες αλλάζουν σπάνια -> μεγάλη cache.
# Το index.html να ανανεώνεται γρήγορα ώστε οι αλλαγές τιμών να φαίνονται άμεσα.
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
